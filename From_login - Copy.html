<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="./From_login.css">
</head>

<body>

    <div class="Form_Bg">
        <div class="From_border">
            <div class="Form_Content">
                <h3>Connect With</h3>

                <div class="Option_Row">
                    <div class="Optio_Item">
                        <img src="./gogle.jpg" alt="Google">
                        <p>Google</p>
                    </div>
                    <div class="Optio_Item">
                        <img src="./apple.png" alt="Apple">
                        <p>Apple</p>
                    </div>
                </div>

                <form>
                    <div class="input_group">
                        <input type="email" class="input_field" placeholder="Enter Email address" required>
                    </div>

                    <div class="input_group">
                        <div class="pass_label">
                            <label>Password</label>
                            <span class="forget">Forgot password?</span>
                        </div>
                        <input type="password" class="input_field" placeholder="Password" required>
                    </div>

                    <button type="submit" class="btn_login">Login</button>
                </form>

                <div class="signup_link">
                    Don't have an account? <a href="#">Sign up</a>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
